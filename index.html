<!doctype html>
<html lang="en">
  <head>
    <script>
      try {
        var th = localStorage.getItem('favify-theme')
        document.documentElement.classList.toggle('dark', th === 'dark')
        var loc = localStorage.getItem('favify-locale')
        if (loc === 'ko') document.documentElement.lang = 'ko'
      } catch (e) {}
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Favify — turn a portrait into a 3D-style avatar and a complete favicon package in your browser."
    />
    <meta name="theme-color" content="#f9f5ff" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <title>Favify</title>
  </head>
  <body>
    <script>
      try {
        var th2 = localStorage.getItem('favify-theme')
        document.body.classList.toggle('dark', th2 === 'dark')
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
